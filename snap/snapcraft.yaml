name: speedofsound
adopt-info: speedofsound
summary: Voice typing for the Linux desktop.
description: |
  Voice typing for the Linux desktop.
  - Offline, on-device transcription using Whisper. No data leaves your machine.
  - Types the result directly into any focused application using Portals for wide desktop support (X11, Wayland).
  - Works out of the box with the built-in multilingual Whisper Tiny model. Download additional models from within the app to improve accuracy.
  - Optional text polishing with LLMs (Anthropic, Google, OpenAI), with support for custom context and vocabulary.
  - Supports self-hosted services like vLLM, Ollama, and llama.cpp (cloud services supported but not required).

base: core24
grade: stable
confinement: strict

title: Speed of Sound
contact: https://github.com/zugaldia/speedofsound
donation: https://github.com/zugaldia/speedofsound
source-code: https://github.com/zugaldia/speedofsound
website: https://github.com/zugaldia/speedofsound
issues: https://github.com/zugaldia/speedofsound/issues
license: MIT

lint:
  ignore:
    - library # Ignore unused library warnings from JDK

platforms:
  amd64:
    build-on: [ amd64 ]
    build-for: [ amd64 ]

parts:
  jdk:
    plugin: nil
    stage-packages:
      - openjdk-25-jre
      - libasound2 # See snap/asound.conf
      - libasound2-plugins
  speedofsound:
    plugin: meson
    source: .
    source-type: local
    meson-parameters:
      - --prefix=/usr
      - --buildtype=release
    build-packages:
      - openjdk-25-jdk
    build-environment:
      - JAVA_HOME: /usr/lib/jvm/java-25-openjdk-amd64
      - PATH: /usr/lib/jvm/java-25-openjdk-amd64/bin:$PATH
    parse-info: [ usr/share/metainfo/io.speedofsound.App.metainfo.xml ]
  alsa-conf:
    plugin: dump
    source: snap
    organize:
      asound.conf: etc/asound.conf
    stage:
      - etc/asound.conf
slots:
  speedofsound:
    interface: dbus
    bus: session
    name: io.speedofsound.App

apps:
  speedofsound:
    extensions: [ gnome ]
    command: usr/bin/speedofsound
    common-id: io.speedofsound.App
    desktop: usr/share/applications/io.speedofsound.App.desktop
    slots:
      - speedofsound
    plugs:
      - network       # Enables network access
      - audio-record  # Allows audio recording
      - alsa          # Java (javax.sound) uses ALSA
      - gsettings     # GSettings access for GioStore
    environment:
      JAVA_HOME: $SNAP/usr/lib/jvm/java-25-openjdk-amd64
      PATH: $SNAP/usr/lib/jvm/java-25-openjdk-amd64/bin:$PATH
      ALSA_CONFIG_PATH: $SNAP/etc/asound.conf
      ALSA_PLUGIN_DIR: $SNAP/usr/lib/x86_64-linux-gnu/alsa-lib
      # LD_LIBRARY_PATH from https://documentation.ubuntu.com/snapcraft/stable/reference/extensions/gnome-extension/
      LD_LIBRARY_PATH: /snap/gnome-46-2404-sdk/current/lib/x86_64-linux-gnu:/snap/gnome-46-2404-sdk/current/usr/lib/x86_64-linux-gnu:/snap/gnome-46-2404-sdk/current/usr/lib:/snap/gnome-46-2404-sdk/current/usr/lib/vala-current:/snap/gnome-46-2404-sdk/current/usr/lib/x86_64-linux-gnu/pulseaudio${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
