name: Release GitHub

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      channel:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.8.0 or 0.8.0-alpha.1)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - stable
          - beta
          - alpha

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
          lfs: true
      - name: Install GTK4
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build and test
        env:
          GRADLE_OPTS: --enable-native-access=ALL-UNNAMED
        run: |
          ./gradlew build check \
            -PreleaseVersion=${{ inputs.version }} \
            -Pspeedofsound.disableGioStore=true
      - name: Build shadow JAR
        env:
          GRADLE_OPTS: --enable-native-access=ALL-UNNAMED
        run: |
          ./gradlew shadowJar \
            -PreleaseVersion=${{ inputs.version }} \
            -Pspeedofsound.disableGioStore=true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ inputs.channel }}" != "stable" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${{ inputs.version }}" \
            app/build/libs/speedofsound.jar \
            scripts/trigger.sh \
            --title "Release v${{ inputs.version }}" \
            --generate-notes \
            $PRERELEASE_FLAG
