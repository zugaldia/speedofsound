name: Snap Publish

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      channel:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.8.0 or 0.8.0-beta.1)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - stable
          - beta

jobs:
  snap:
    name: "Snap"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
          lfs: true
      - uses: snapcore/action-build@v1
        id: build
      - name: Lint snap
        run: sg lxd -c "snapcraft lint ${{ steps.build.outputs.snap }}"
      - name: Determine release channels
        id: channels
        run: |
          # When publishing to stable, also update beta so beta users are never behind
          if [[ "${{ inputs.channel }}" == "stable" ]]; then
            echo "release=stable,beta" >> "$GITHUB_OUTPUT"
          else
            echo "release=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_LOGIN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: ${{ steps.channels.outputs.release }}
